<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Kelsey's Way Fan Page</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #ff4d6d, #ff9a9e, #fad0c4);
      color: white;
      text-align: center;
    }

    .container {
      padding: 40px 20px;
    }

    h1 {
      font-size: 60px;
      margin-bottom: 10px;
      text-shadow: 0 5px 15px rgba(0,0,0,0.3);
    }

    .subtitle {
      font-size: 20px;
      opacity: 0.9;
    }

    .card {
      margin: 40px auto;
      padding: 25px;
      max-width: 650px;
      background: rgba(255,255,255,0.1);
      border-radius: 20px;
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    .images {
      display: flex;
      gap: 15px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .images img {
      width: 130px;
      height: 130px;
      object-fit: cover;
      border-radius: 15px;
      transition: 0.3s;
    }

    .images img:hover {
      transform: scale(1.1);
    }

    button {
      padding: 15px 30px;
      font-size: 18px;
      border: none;
      border-radius: 12px;
      background: white;
      color: #ff4d6d;
      cursor: pointer;
      font-weight: bold;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.08);
      background: #ffe6ea;
    }

    #video {
      margin-top: 20px;
      display: none;
    }

    iframe {
      width: 100%;
      height: 315px;
      border-radius: 15px;
      border: none;
    }

    footer {
      margin-top: 40px;
      font-size: 12px;
      opacity: 0.7;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Welcome to the Kelsey's Way Fan Page!</h1>
    <p class="subtitle">The #1 place for fans 🔥</p>

    <div class="card">

      <!-- YOUR IMAGES -->
      <div class="images">
        <img src="download.jpg">
        <img src="download (1).jpg">
        <img src="download (2).jpg">
      </div>

      <button onclick="showVideo()">Kelsey's Way Edit! ❤️</button>

      <!-- VIDEO -->
      <div id="video">
        <iframe src="https://www.youtube.com/embed/f8Q3wP0SCqs"></iframe>
      </div>

    </div>

    <footer>
      Hope You Enojoy!
    </footer>
  </div>

  <script>
    function showVideo() {
      document.getElementById("video").style.display = "block";

      // Enjoy
      fetch('/api/log');
    }
  </script>

</body>
</html>
