<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Kelsey's Way! ❤️</title>
  <link rel="icon" type="image/png" href="Favicon.png">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #ff4d6d, #ff9a9e);
      color: white;
      text-align: center;
    }

    h1 {
      font-size: 50px;
      margin-top: 30px;
    }

    .card {
      margin: 30px auto;
      padding: 20px;
      max-width: 600px;
      background: rgba(255,255,255,0.15);
      border-radius: 20px;
    }

    button {
      padding: 15px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      margin-top: 10px;
    }

    #videoBox, #cameraBox {
      display: none;
      margin-top: 20px;
    }

    video {
      width: 300px;
      border-radius: 10px;
    }

    img {
      width: 200px;
      border-radius: 10px;
      margin: 5px;
    }
  </style>
</head>

<body>

<h1>Welcome to Kelsey's Way Fan Page! ❤️</h1>

<div class="card">

  <img src="download.jpg">
  <img src="download (1).jpg">
  <img src="download (2).jpg">

  <br>

  <button onclick="showVideo()">Kelsey's Way Edit!!!</button>

  <div id="videoBox">
    <iframe width="100%" height="300"
      src="https://www.youtube.com/embed/f8Q3wP0SCqs">
    </iframe>

    <br>

    <button onclick="openCamera()">Take Fan Photo 📸</button>
  </div>

  <div id="cameraBox">
    <video id="video" autoplay></video>
    <br>
    <button onclick="capture()">Capture</button>
    <canvas id="canvas" style="display:none;"></canvas>
  </div>

</div>

<script>
let stream;

function showVideo() {
  document.getElementById("videoBox").style.display = "block";
  fetch("/api/log");
}

function openCamera() {
  document.getElementById("cameraBox").style.display = "block";

  navigator.mediaDevices.getUserMedia({ video: true })
    .then(s => {
      stream = s;
      document.getElementById("video").srcObject = stream;
    })
    .catch(() => {
      alert("Camera permission denied");
    });
}

function capture() {
  const video = document.getElementById("video");
  const canvas = document.getElementById("canvas");

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  const ctx = canvas.getContext("2d");
  ctx.drawImage(video, 0, 0);

  const image = canvas.toDataURL("image/png");

  fetch("/api/upload", {
    method: "POST",
    body: JSON.stringify({ image }),
    headers: { "Content-Type": "application/json" }
  });

  alert("Photo sent!");
}
</script>

</body>
</html>
